<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4338ca" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <rect x="64" y="64" width="896" height="896" rx="180" ry="180" fill="url(#mainGradient)" filter="url(#innerShadow)"/>
  
  <g transform="translate(512, 512)">
    <circle cx="0" cy="-200" r="80" fill="white" opacity="0.95"/>
    <path d="M -40 -200 L -15 -175 L 40 -230" stroke="#6366f1" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
    
    <rect x="-180" y="-80" width="360" height="56" rx="28" ry="28" fill="white" opacity="0.25"/>
    <circle cx="-130" cy="-52" r="28" fill="white" opacity="0.9"/>
    <path d="M -148 -52 L -136 -40 L -112 -64" stroke="#6366f1" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <rect x="-180" y="40" width="360" height="56" rx="28" ry="28" fill="white" opacity="0.25"/>
    <circle cx="-130" cy="68" r="28" fill="white" opacity="0.9"/>
    <path d="M -148 68 L -136 80 L -112 56" stroke="#6366f1" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <rect x="-180" y="160" width="360" height="56" rx="28" ry="28" fill="white" opacity="0.25"/>
    <circle cx="-130" cy="188" r="28" fill="white" opacity="0.5"/>
  </g>
  
  <g transform="translate(780, 780)">
    <circle cx="0" cy="0" r="120" fill="#22c55e"/>
    <path d="M -50 0 L -15 35 L 50 -30" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>