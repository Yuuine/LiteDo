name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: ''

jobs:
  validate:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate version format
        id: validate
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format. Expected: X.Y.Z (e.g., 1.0.0)"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

  build-release:
    name: Build & Release
    runs-on: windows-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install dependencies
        run: |
            npm ci

      - name: Update version in package.json
        run: |
          VERSION="${{ github.event.inputs.version }}"
          npm pkg set "version=$VERSION"
          shell: bash

      - name: Update version in tauri.conf.json
        run: |
          VERSION="${{ github.event.inputs.version }}"
          $TAURI_CONF = "src-tauri/tauri.conf.json"
          $CONTENT = Get-Content $TAURI_CONF | ConvertFrom-Json
          $CONTENT.version = $VERSION
          $CONTENT | ConvertTo-Json | Set-Content $TAURI_CONF
        shell: pwsh

      - name: Build application
        run: |
            npm run tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: LiteDo v${{ github.event.inputs.version }}
          body: |
            ## What's Changed
            
            See [CHANGELOG.md](./CHANGELOG.md) for details.
            
            ## Installation
            
            Download the appropriate installer for your platform:
            - **MSI**: `LiteDo_${{ github.event.inputs.version }}_x64_en-US.msi`
            - **NSIS**: `LiteDo_${{ github.event.inputs.version }}_x64-setup.exe`
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: build-release
    if: success()
    steps:
      - name: Send notification
        run: |
          echo "Release v${{ github.event.inputs.version }} completed successfully!"
          echo "Check the release at: https://github.com/${{ github.repository }}/releases"

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [validate, build-release]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "Release workflow failed!"
          echo "Check the workflow logs for details."
